<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JAMB Vibe Master Pro</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #f0f4f8; --card: #ffffff; --text: #1a2a3a; --accent: #007bff; --nav: #ffffff; --border: #d1d9e0; --correct: #28a745; --wrong: #dc3545; }
        [data-theme="dark"] { --bg: #0d1117; --card: #161b22; --text: #c9d1d9; --accent: #58a6ff; --nav: #161b22; --border: #30363d; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 90px; overflow-x: hidden; }
        #app-container { width: 100%; max-width: 500px; margin: auto; padding: 15px; }
        
        .card { background: var(--card); padding: 20px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); margin-bottom: 20px; border: 1px solid var(--border); }
        .hidden { display: none !important; }

        /* Navigation */
        .nav-bar { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 500px; background: var(--nav); display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { cursor: pointer; text-align: center; font-size: 11px; opacity: 0.4; flex: 1; color: var(--text); transition: 0.2s; }
        .nav-item.active { opacity: 1; color: var(--accent); font-weight: bold; }

        /* Question Navigation */
        .q-nav-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; margin-top: 20px; max-height: 130px; overflow-y: auto; padding: 10px; background: rgba(0,0,0,0.04); border-radius: 16px; }
        .q-num { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 11px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer; background: var(--card); }
        .q-num.answered { background: var(--accent); color: white; border-color: var(--accent); }
        .q-num.current { border: 2.5px solid var(--accent); font-weight: 900; }

        /* Exam Interface */
        .opt-btn { background: var(--card); border: 2px solid var(--border); color: var(--text); text-align: left; margin-bottom: 12px; width: 100%; padding: 18px; border-radius: 16px; cursor: pointer; transition: 0.2s; font-size: 15px; }
        .opt-btn.selected { background: var(--accent); color: white; border-color: var(--accent); }
        
        /* Review Colors */
        .opt-btn.is-correct { background: var(--correct) !important; color: white !important; border-color: var(--correct) !important; }
        .opt-btn.is-wrong { background: var(--wrong) !important; color: white !important; border-color: var(--wrong) !important; }

        /* Progress Bar */
        .prog-outer { width: 100%; background: rgba(0,0,0,0.1); height: 26px; border-radius: 13px; margin: 20px 0; overflow: hidden; }
        .prog-inner { width: 0%; height: 100%; background: var(--accent); transition: 0.5s; display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; font-weight: bold; }
        
        #calc-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 290px; background: #1c1c1e; padding: 22px; border-radius: 30px; z-index: 2000; box-shadow: 0 30px 60px rgba(0,0,0,0.6); color: white; }
    </style>
</head>
<body data-theme="light">

<div id="app-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 id="header-title" style="margin:0; font-weight: 800;">Home</h2>
        <div onclick="toggleTheme()" style="cursor:pointer;"><i data-lucide="moon" id="theme-icon"></i></div>
    </div>

    <div id="tab-home">
        <div class="card">
            <h3 style="margin-top:0;">HELLO, <span id="user-display-name" style="color: var(--accent);">STUDENT</span></h3>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin: 25px 0;">
                <div style="background:rgba(0,123,255,0.07); padding:18px; border-radius:20px; text-align:center;">
                    <span style="font-size:11px; opacity:0.6; display:block;">SESSIONS</span>
                    <b id="stat-sessions" style="font-size:26px; color:var(--accent);">0</b>
                </div>
                <div style="background:rgba(0,123,255,0.07); padding:18px; border-radius:20px; text-align:center;">
                    <span style="font-size:11px; opacity:0.6; display:block;">TOP SCORE</span>
                    <b id="stat-best" style="font-size:26px; color:var(--accent);">0%</b>
                </div>
            </div>
            <p style="font-weight:800; font-size:15px; margin-bottom:15px;">Session History</p>
            <div id="history-box"></div>
        </div>
    </div>

    <div id="tab-practice" class="hidden">
        <div id="login-screen" class="card">
            <h3>CBT Portal</h3>
            <input type="text" id="username-in" placeholder="Full Name" style="width:100%; padding:15px; border-radius:14px; border:1px solid var(--border); margin-bottom:15px;">
            <button onclick="saveName()" style="width:100%; background:var(--accent); color:white; border:none; padding:16px; border-radius:14px; font-weight:bold;">Log In</button>
        </div>

        <div id="setup-screen" class="card hidden">
            <h3>Setup Session</h3>
            <div id="sub-list-setup" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px;"></div>
            <button onclick="syncQuestions()" style="width:100%; background:var(--accent); color:white; border:none; padding:16px; border-radius:14px; font-weight:bold;">Generate Mock</button>
        </div>

        <div id="loading-screen" class="card hidden" style="text-align: center;">
            <h3 id="loader-status">Fetching Data...</h3>
            <div class="prog-outer"><div id="prog-bar" class="prog-inner">0%</div></div>
            <div id="countdown-sync" style="font-size: 45px; font-weight: 900; color: var(--accent);"></div>
        </div>

        <div id="exam-screen" class="card hidden">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom:20px;">
                <div id="exam-timer" style="color:#dc3545; font-weight:900; font-family:monospace; font-size:22px;">120:00</div>
                <div onclick="toggleCalc()" style="cursor:pointer; color:var(--accent);"><i data-lucide="calculator"></i></div>
            </div>
            <div id="sub-tabs-bar" style="display:flex; gap:10px; overflow-x:auto; padding-bottom:15px; border-bottom: 1px solid var(--border);"></div>
            
            <div id="q-meta" style="margin-top:15px; display: flex; justify-content: space-between; font-weight: bold; font-size: 13px;">
                <span id="q-sub-title" style="color: var(--accent)">Subject</span>
                <span id="q-progress-text">0 / 40 Answered</span>
            </div>
            <div id="question-box" style="margin: 15px 0; padding: 20px; background: rgba(0,0,0,0.02); border-left: 5px solid var(--accent); border-radius: 10px;"></div>
            <div id="options-box"></div>

            <div style="display: flex; gap: 12px; margin-top:25px;">
                <button onclick="prevQ()" style="background:#6c757d; color:white; border:none; flex:1; padding:15px; border-radius:14px; font-weight:bold;">Back</button>
                <button onclick="nextQ()" style="background:var(--accent); color:white; border:none; flex:1; padding:15px; border-radius:14px; font-weight:bold;">Next</button>
            </div>

            <div class="q-nav-grid" id="q-nav-grid"></div>
            <button id="main-submit-btn" onclick="submitCBT()" style="background:#dc3545; color:white; border:none; width:100%; padding:16px; border-radius:16px; margin-top:25px; font-weight:800;">Submit Final Result</button>
            <button id="close-review-btn" onclick="location.reload()" class="hidden" style="background:#28a745; color:white; border:none; width:100%; padding:16px; border-radius:16px; margin-top:25px; font-weight:800;">Close Review</button>
        </div>

        <div id="result-screen" class="card hidden" style="text-align:center;">
            <p>Your Performance</p>
            <h1 id="final-percent" style="font-size: 60px; color: #28a745; margin: 15px 0;">0%</h1>
            <div id="breakdown-list" style="margin-bottom: 30px; text-align: left;"></div>
            <button onclick="startReview()" style="background:#6c757d; color:white; border:none; padding:16px; border-radius:14px; width:100%; margin-bottom: 10px;">Review Mistakes</button>
            <button onclick="location.reload()" style="background:#28a745; color:white; border:none; padding:16px; border-radius:14px; width:100%;">Return Home</button>
        </div>
    </div>

    <div id="tab-ideas" class="hidden">
        <div class="card">
            <h3>Do you have a feedback</h3>
            <textarea id="idea-msg" placeholder="Write your feedback here..." style="width:100%; height:130px; border-radius:15px; padding:15px; border:1px solid var(--border);"></textarea>
            <button onclick="sendIdea()" style="width:100%; background:#25D366; color:white; border:none; padding:16px; border-radius:14px; margin-top:10px; font-weight: bold;">Send via WhatsApp</button>
        </div>
    </div>
</div>

<div id="calc-modal" class="hidden">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px;">
        <span style="font-size:11px; opacity:0.5; font-weight:bold; color: white;">VIBE CALC</span>
        <button onclick="toggleCalc()" style="background:#ff3b30; color:white; border:none; border-radius:50%; width:24px; height:24px; cursor:pointer;">?</button>
    </div>
    <input type="text" id="calc-display" class="calc-screen" readonly value="0">
    <div class="calc-btns">
        <button onclick="cClr()">C</button><button onclick="cPress('/')" style="background:#ff9f0a;">÷</button><button onclick="cPress('*')" style="background:#ff9f0a;">×</button><button onclick="cPress('-')" style="background:#ff9f0a;">?</button>
        <button onclick="cPress('7')">7</button><button onclick="cPress('8')">8</button><button onclick="cPress('9')">9</button><button onclick="cPress('+')" style="background:#ff9f0a;">+</button>
        <button onclick="cPress('4')">4</button><button onclick="cPress('5')">5</button><button onclick="cPress('6')">6</button><button onclick="cSolve()" style="background:#ff9f0a;">=</button>
        <button onclick="cPress('1')">1</button><button onclick="cPress('2')">2</button><button onclick="cPress('3')">3</button><button onclick="cPress('0')">0</button>
    </div>
</div>

<div class="nav-bar">
    <div class="nav-item active" onclick="switchTab('home', this)"><i data-lucide="home"></i><br>Home</div>
    <div id="nav-pract" class="nav-item" onclick="switchTab('practice', this)"><i data-lucide="pencil"></i><br>Practice</div>
    <div class="nav-item" onclick="switchTab('ideas', this)"><i data-lucide="lightbulb"></i><br>Ideas</div>
</div>

<script>
    const KEY = "ALOC-37270319fe62227b783f";
    const SUBS = ["English", "Mathematics", "Physics", "Chemistry", "Biology", "Economics", "Government", "Literature", "Commerce", "Geography", "History"];
    
    let store = JSON.parse(localStorage.getItem('vibe_master_db')) || { name: "", sessions: 0, best: 0, history: [] };
    let eData = {}, uAns = {}, selected = [], active = "", currIdx = 0, isReview = false;
    let mainTimer;

    function refresh() {
        document.getElementById('user-display-name').innerText = (store.name || "Student").toUpperCase();
        document.getElementById('stat-sessions').innerText = store.sessions;
        document.getElementById('stat-best').innerText = store.best + "%";
        localStorage.setItem('vibe_master_db', JSON.stringify(store));
        lucide.createIcons();
    }
    refresh();

    function switchTab(t, el) {
        ['home', 'practice', 'ideas'].forEach(x => document.getElementById('tab-'+x).classList.add('hidden'));
        document.getElementById('tab-'+t).classList.remove('hidden');
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('header-title').innerText = t.charAt(0).toUpperCase() + t.slice(1);
    }

    function toggleTheme() {
        document.body.dataset.theme = document.body.dataset.theme === 'dark' ? 'light' : 'dark';
        lucide.createIcons();
    }

    function saveName() {
        const n = document.getElementById('username-in').value.trim();
        if(!n) return alert("Enter name!");
        store.name = n; refresh();
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('setup-screen').classList.remove('hidden');
    }

    const gridSetup = document.getElementById('sub-list-setup');
    SUBS.forEach(s => {
        const c = document.createElement('div');
        c.style.cssText = "padding: 12px; border: 1.5px solid var(--accent); border-radius: 12px; text-align: center; cursor: pointer;";
        c.innerText = s;
        c.onclick = () => {
            if(selected.includes(s)) { selected = selected.filter(x => x!==s); c.style.background = ""; c.style.color = ""; }
            else if(selected.length < 4) { selected.push(s); c.style.background = "var(--accent)"; c.style.color = "white"; }
        };
        gridSetup.appendChild(c);
    });

    async function syncQuestions() {
        if(!selected.length) return alert("Select subjects!");
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('loading-screen').classList.remove('hidden');

        const bar = document.getElementById('prog-bar');
        let done = 0;

        try {
            for(let s of selected) {
                const res = await fetch(`https://questions.aloc.com.ng/api/v2/m?subject=${s.toLowerCase()}`, { headers: { 'AccessToken': KEY } });
                const json = await res.json();
                let targetCount = (s === "English") ? 60 : 40;
                eData[s] = json.data.slice(0, targetCount).map(q => ({
                    q: q.question.replace(/[^\x00-\x7F]/g, ""),
                    opts: [q.option.a, q.option.b, q.option.c, q.option.d],
                    ans: ["a","b","c","d"].indexOf(q.answer.toLowerCase())
                }));
                uAns[s] = {};
                done++;
                bar.style.width = Math.round((done / selected.length) * 100) + "%";
                bar.innerText = bar.style.width;
            }
            active = selected[0];
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('exam-screen').classList.remove('hidden');
            renderTabs(); loadQ(); startTimer();
        } catch { alert("API Offline."); location.reload(); }
    }

    function renderTabs() {
        const c = document.getElementById('sub-tabs-bar'); c.innerHTML = "";
        selected.forEach(s => {
            const b = document.createElement('button');
            b.innerText = s; b.style.cssText = `width:auto; padding:8px 18px; font-size:11px; border:none; border-radius:12px; background:${s===active?"#007bff":"#555"}; color:white; cursor:pointer;`;
            b.onclick = () => { active = s; currIdx = 0; renderTabs(); loadQ(); };
            c.appendChild(b);
        });
    }

    function loadQ() {
        const list = eData[active];
        const q = list[currIdx];
        document.getElementById('q-sub-title').innerText = active;
        document.getElementById('q-progress-text').innerText = `${Object.keys(uAns[active]).length} / ${list.length} Answered`;
        document.getElementById('question-box').innerHTML = q.q;
        const box = document.getElementById('options-box'); box.innerHTML = "";
        
        q.opts.forEach((o, i) => {
            const b = document.createElement('button');
            b.className = `opt-btn ${uAns[active][currIdx] === i ? 'selected' : ''}`;
            
            if(isReview) {
                if(i === q.ans) b.classList.add('is-correct');
                else if(uAns[active][currIdx] === i) b.classList.add('is-wrong');
                b.disabled = true;
            }

            b.innerHTML = `<b>${String.fromCharCode(65+i)}.</b> ${o}`;
            b.onclick = () => { uAns[active][currIdx] = i; loadQ(); renderNav(); };
            box.appendChild(b);
        });
        renderNav();
    }

    function renderNav() {
        const grid = document.getElementById('q-nav-grid'); grid.innerHTML = "";
        eData[active].forEach((_, i) => {
            const n = document.createElement('div');
            n.className = `q-num ${uAns[active][i] !== undefined ? 'answered' : ''} ${i === currIdx ? 'current' : ''}`;
            n.innerText = i + 1;
            n.onclick = () => { currIdx = i; loadQ(); };
            grid.appendChild(n);
        });
    }

    function nextQ() { if(currIdx < eData[active].length-1) { currIdx++; loadQ(); } }
    function prevQ() { if(currIdx > 0) { currentIdx--; loadQ(); } }

    function startTimer() {
        let t = 120 * 60;
        mainTimer = setInterval(() => {
            let m = Math.floor(t/60), s = t%60;
            document.getElementById('exam-timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if(t <= 0) { clearInterval(mainTimer); submitCBT(); }
            t--;
        }, 1000);
    }

    function submitCBT() {
        clearInterval(mainTimer);
        let score = 0, total = 0, log = "";
        selected.forEach(s => {
            let sScore = 0;
            eData[s].forEach((q, i) => { total++; if(uAns[s][i] === q.ans) { score++; sScore++; } });
            log += `${s}: ${sScore}/${eData[s].length}\n`;
        });
        const p = Math.round((score/total)*100);
        store.sessions++; if(p > store.best) store.best = p;
        refresh();
        document.getElementById('exam-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('final-percent').innerText = p + "%";
        document.getElementById('breakdown-list').innerText = log;
    }

    function startReview() {
        isReview = true;
        document.getElementById('result-screen').classList.add('hidden');
        document.getElementById('exam-screen').classList.remove('hidden');
        document.getElementById('main-submit-btn').classList.add('hidden');
        document.getElementById('close-review-btn').classList.remove('hidden');
        document.getElementById('exam-timer').innerText = "REVIEW MODE";
        loadQ();
    }

    function toggleCalc() { document.getElementById('calc-modal').classList.toggle('hidden'); }
    function cPress(v) { let d = document.getElementById('calc-display'); d.value === '0' ? d.value = v : d.value += v; }
    function cClr() { document.getElementById('calc-display').value = '0'; }
    function cSolve() { try { document.getElementById('calc-display').value = eval(document.getElementById('calc-display').value); } catch { document.getElementById('calc-display').value = "Err"; } }
    function sendIdea() { window.open(`https://wa.me/2349042427548?text=${encodeURIComponent(document.getElementById('idea-msg').value)}`); }
</script>
</body>
</html>
